<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{SOLUTION_NAME}} — Solution Profile</title>

<!-- CDN Libraries -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/vis-network@9/standalone/umd/vis-network.min.js"></script>

<style>
:root {
  --bg: #0f1117;
  --bg-card: #1a1d27;
  --bg-card-hover: #222633;
  --border: #2a2e3d;
  --text: #e1e4ed;
  --text-muted: #8b90a0;
  --accent: #6c8cff;
  --green: #4ade80;
  --yellow: #facc15;
  --red: #f87171;
  --orange: #fb923c;
  --purple: #a78bfa;
  --cyan: #22d3ee;
  --pink: #f472b6;
  --radius: 10px;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* Dark scrollbars */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
html { scrollbar-color: var(--border) var(--bg); }

/* Loading overlay */
#loading {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999; transition: opacity 0.3s;
}
#loading.hidden { opacity: 0; pointer-events: none; }
#loading .spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.header {
  background: linear-gradient(135deg, #1a1d27 0%, #252940 100%);
  border-bottom: 1px solid var(--border);
  padding: 24px 32px;
}
.header h1 { font-size: 1.5rem; font-weight: 600; }
.header h1 span { color: var(--accent); }
.header .meta { color: var(--text-muted); font-size: 0.85rem; margin-top: 4px; }

/* KPI Cards */
.kpi-row { display: flex; gap: 12px; padding: 20px 32px; flex-wrap: wrap; }
.kpi-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 20px;
  flex: 1; min-width: 110px; text-align: center;
  cursor: pointer; transition: border-color 0.2s, transform 0.15s;
}
.kpi-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.kpi-card .value { font-size: 1.8rem; font-weight: 700; color: var(--accent); line-height: 1.2; }
.kpi-card .label {
  font-size: 0.78rem; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px;
}

/* Tabs */
.tab-bar {
  display: flex; gap: 0; padding: 0 32px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-card); overflow-x: auto;
}
.tab-btn {
  padding: 12px 20px; background: none; border: none;
  border-bottom: 2px solid transparent;
  color: var(--text-muted); cursor: pointer;
  font-size: 0.9rem; font-weight: 500; white-space: nowrap;
  transition: all 0.2s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
.pfg-tab-btn { background:none; border:none; border-bottom:2px solid transparent; padding:8px 16px; cursor:pointer; color:var(--text-muted); font-size:0.9rem; font-weight:400; white-space:nowrap; margin-bottom:-1px; }
.pfg-tab-btn:hover { color:var(--text); }
.pfg-tab-btn.pfg-active { color:var(--accent); border-bottom-color:var(--accent); font-weight:600; }

.tab-content { display: none; padding: 24px 32px; }
.tab-content.active { display: block; }

/* Grid layouts */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
@media (max-width: 900px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

/* Cards */
.card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow);
}
.card h3 {
  font-size: 0.95rem; font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}

.chart-container { position: relative; width: 100%; }
.chart-container canvas { max-height: 400px; }

/* Network graph */
.network-container {
  width: 100%; height: 500px;
  border: 1px solid var(--border); border-radius: var(--radius);
  background: #12141c;
}

/* DataTables dark theme */
table.dataTable { border-collapse: collapse !important; width: 100% !important; }
table.dataTable thead th {
  background: #1e2130 !important; color: var(--text-muted) !important;
  border-bottom: 1px solid var(--border) !important;
  font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.3px;
  padding: 10px 12px !important;
}
table.dataTable tbody td {
  background: var(--bg-card) !important; color: var(--text) !important;
  border-bottom: 1px solid var(--border) !important;
  padding: 8px 12px !important; font-size: 0.88rem;
}
table.dataTable tbody tr:hover td { background: var(--bg-card-hover) !important; }
.dataTables_wrapper .dataTables_filter input,
.dataTables_wrapper .dataTables_length select {
  background: var(--bg) !important; color: var(--text) !important;
  border: 1px solid var(--border) !important; border-radius: 4px; padding: 4px 8px;
}
.dataTables_wrapper .dataTables_info, .dataTables_wrapper .dataTables_length,
.dataTables_wrapper .dataTables_filter, .dataTables_wrapper .dataTables_paginate {
  color: var(--text-muted) !important; font-size: 0.85rem; padding: 8px 0 !important;
}
.dataTables_wrapper .dataTables_paginate .paginate_button {
  color: var(--text-muted) !important; border: 1px solid var(--border) !important;
  background: var(--bg-card) !important; border-radius: 4px !important; margin: 0 2px !important;
}
.dataTables_wrapper .dataTables_paginate .paginate_button.current {
  color: var(--accent) !important; border-color: var(--accent) !important; background: var(--bg) !important;
}
.dataTables_wrapper .dataTables_paginate .paginate_button:hover {
  color: var(--text) !important; background: var(--bg-card-hover) !important; border-color: var(--accent) !important;
}

/* Badges */
.badge {
  display: inline-block; padding: 3px 10px; border-radius: 20px;
  font-size: 0.8rem; font-weight: 600; text-transform: uppercase;
}
.badge-blue { background: rgba(108,140,255,0.15); color: var(--accent); }
.badge-green { background: rgba(74,222,128,0.15); color: var(--green); }
.badge-yellow { background: rgba(250,204,21,0.15); color: var(--yellow); }
.badge-red { background: rgba(248,113,113,0.15); color: var(--red); }

/* Stat rows */
.stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
.stat-row:last-child { border-bottom: none; }
.stat-label { color: var(--text-muted); font-size: 0.88rem; }
.stat-value { font-weight: 600; font-size: 0.88rem; }

/* Tags */
.tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
.tag {
  display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 0.78rem;
  background: rgba(108,140,255,0.1); color: var(--accent); border: 1px solid rgba(108,140,255,0.2);
}
.tag-red { background: rgba(248,113,113,0.1); color: var(--red); border-color: rgba(248,113,113,0.2); }
.tag-yellow { background: rgba(250,204,21,0.1); color: var(--yellow); border-color: rgba(250,204,21,0.2); }

/* Gauge */
.gauge-container { text-align: center; }
.gauge-value { font-size: 2rem; font-weight: 700; }
.gauge-label { font-size: 0.8rem; color: var(--text-muted); }
.gauge-bar { height: 8px; border-radius: 4px; background: var(--border); margin-top: 8px; overflow: hidden; }
.gauge-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }

/* Scrollable list */
.scroll-list { max-height: 300px; overflow-y: auto; font-size: 0.85rem; }
.scroll-list li { padding: 4px 0; border-bottom: 1px solid var(--border); list-style: none; }

/* Empty state */
.empty-state { color: var(--text-muted); text-align: center; padding: 24px; font-size: 0.9rem; }

/* Overview highlights */
.highlight-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; }
.highlight-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px; border-left: 3px solid var(--accent);
}
.highlight-card.warn { border-left-color: var(--yellow); }
.highlight-card.danger { border-left-color: var(--red); }
.highlight-card.good { border-left-color: var(--green); }
.highlight-card h4 { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 4px; }
.highlight-card .hl-value { font-size: 1.1rem; font-weight: 600; }

/* Print */
@media print {
  body { background: #fff; color: #222; }
  .header { background: #f5f5f5; border-bottom: 1px solid #ccc; }
  .header h1 span { color: #333; }
  .tab-bar { display: none; }
  .tab-content { display: block !important; page-break-inside: avoid; padding: 16px 0; }
  .tab-content::before {
    content: attr(data-tab-title);
    display: block; font-size: 1.3rem; font-weight: 700; margin-bottom: 12px;
    border-bottom: 2px solid #333; padding-bottom: 4px;
  }
  .card { border: 1px solid #ccc; box-shadow: none; break-inside: avoid; }
  .kpi-card { border: 1px solid #ccc; }
  .kpi-card .value { color: #333; }
  .network-container { height: 300px; }
  :root { --bg-card: #fff; --border: #ddd; --text: #222; --text-muted: #666; }
  #loading { display: none !important; }
}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div></div>

<div class="header">
  <h1><span id="headerSolution"></span> &mdash; Solution Profile</h1>
  <div class="meta" id="headerMeta"></div>
</div>

<div class="kpi-row" id="kpiRow"></div>
<div class="tab-bar" id="tabBar" role="tablist"></div>

<!-- Tab contents -->
<div id="tabOverview" class="tab-content" data-tab-title="Overview"></div>
<div id="tabDataModel" class="tab-content" data-tab-title="Data Model"></div>
<div id="tabScripts" class="tab-content" data-tab-title="Scripts"></div>
<div id="tabUI" class="tab-content" data-tab-title="UI Layer"></div>
<div id="tabCustomFunctions" class="tab-content" data-tab-title="Custom Functions"></div>
<div id="tabIntegrations" class="tab-content" data-tab-title="Integrations"></div>
<div id="tabHealth" class="tab-content" data-tab-title="Health"></div>

<script>
// ============================================================
// Profile data (embedded by analyze.py)
// ============================================================
const PROFILE = {{PROFILE_JSON}};

// Remove loading spinner immediately — data is inline, no need to wait for CDN
function hideLoading() {
  const el = document.getElementById('loading');
  if (el) { el.classList.add('hidden'); setTimeout(() => el.remove(), 300); }
}
// Fallback: remove spinner after 5s even if something crashes
setTimeout(hideLoading, 5000);

// Section wrapper — errors in one section won't kill the rest
function section(name, fn) {
  try { fn(); } catch (e) { console.error(`[${name}]`, e); }
}

// ============================================================
// Utilities
// ============================================================
const COLORS = [
  '#6c8cff','#4ade80','#facc15','#f87171','#fb923c',
  '#a78bfa','#22d3ee','#f472b6','#34d399','#fbbf24',
  '#818cf8','#fb7185','#38bdf8','#c084fc','#a3e635',
  '#f59e0b','#14b8a6','#e879f9','#84cc16','#ef4444'
];
function colorFor(i) { return COLORS[i % COLORS.length]; }
function esc(s) { const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }
function safe(obj, path, fallback) {
  return path.split('.').reduce((o, k) => (o && o[k] !== undefined) ? o[k] : fallback, obj);
}
function pct(n, total) { return total > 0 ? parseFloat(((n / total) * 100).toFixed(1)) : 0; }

// ============================================================
// Lazy chart initialization
// ============================================================
const chartInitializers = {};  // tabId -> [fn, fn, ...]
const initializedTabs = new Set();

function registerChart(tabId, fn) {
  if (!chartInitializers[tabId]) chartInitializers[tabId] = [];
  chartInitializers[tabId].push(fn);
}

function initTab(tabId) {
  if (initializedTabs.has(tabId)) return;
  initializedTabs.add(tabId);
  (chartInitializers[tabId] || []).forEach(fn => fn());
}

// ============================================================
// Header (safe, no innerHTML with user data)
// ============================================================
document.getElementById('headerSolution').textContent = PROFILE.solution || '';
document.getElementById('headerMeta').textContent =
  'Generated ' + (PROFILE.generated_at || '') + ' \u2022 analyze.py' +
  (PROFILE.deep_mode ? ' \u2022 Deep analysis' : '');

// ============================================================
// KPI Cards (clickable to tabs)
// ============================================================
section('KPI Cards', function() {
  const s = safe(PROFILE, 'summary', {});
  const kpis = [
    { value: s.tables || 0, label: 'Tables', tab: 'tabDataModel' },
    { value: s.table_occurrences || 0, label: 'Occurrences', tab: 'tabDataModel' },
    { value: (s.fields || 0).toLocaleString(), label: 'Fields', tab: 'tabDataModel' },
    { value: s.relationships || 0, label: 'Relationships', tab: 'tabDataModel' },
    { value: s.scripts || 0, label: 'Scripts', tab: 'tabScripts' },
    { value: s.layouts || 0, label: 'Layouts', tab: 'tabUI' },
    { value: s.custom_functions || 0, label: 'Custom Funcs', tab: 'tabCustomFunctions' },
    { value: s.value_lists || 0, label: 'Value Lists', tab: 'tabIntegrations' },
  ];
  const row = document.getElementById('kpiRow');
  kpis.forEach(k => {
    const card = document.createElement('div');
    card.className = 'kpi-card';
    card.innerHTML = `<div class="value">${esc(String(k.value))}</div><div class="label">${esc(k.label)}</div>`;
    card.onclick = () => switchTab(k.tab);
    row.appendChild(card);
  });
});

// ============================================================
// Tabs with keyboard nav
// ============================================================
const TAB_DEFS = [
  { id: 'tabOverview', label: 'Overview' },
  { id: 'tabDataModel', label: 'Data Model' },
  { id: 'tabScripts', label: 'Scripts' },
  { id: 'tabUI', label: 'UI Layer' },
  { id: 'tabCustomFunctions', label: 'Custom Functions' },
  { id: 'tabIntegrations', label: 'Integrations' },
  { id: 'tabHealth', label: 'Health' },
];

function switchTab(tabId) {
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tabId);
    b.setAttribute('aria-selected', b.dataset.tab === tabId);
  });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === tabId));
  initTab(tabId);
}

(function() {
  const bar = document.getElementById('tabBar');
  TAB_DEFS.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.textContent = t.label;
    btn.dataset.tab = t.id;
    btn.setAttribute('role', 'tab');
    btn.setAttribute('aria-selected', i === 0);
    btn.onclick = () => switchTab(t.id);
    btn.onkeydown = (e) => {
      let idx = TAB_DEFS.findIndex(x => x.id === t.id);
      if (e.key === 'ArrowRight') idx = (idx + 1) % TAB_DEFS.length;
      else if (e.key === 'ArrowLeft') idx = (idx - 1 + TAB_DEFS.length) % TAB_DEFS.length;
      else return;
      e.preventDefault();
      const next = bar.querySelector(`[data-tab="${TAB_DEFS[idx].id}"]`);
      next.focus(); next.click();
    };
    bar.appendChild(btn);
  });
  document.getElementById(TAB_DEFS[0].id).classList.add('active');
})();

// ============================================================
// OVERVIEW TAB (default landing)
// ============================================================
section('Overview', function() {
  const el = document.getElementById('tabOverview');
  const s = safe(PROFILE, 'summary', {});
  const topo = safe(PROFILE, 'data_model.topology', {});
  const health = safe(PROFILE, 'health', {});
  const bl = safe(PROFILE, 'business_logic', {});
  const ui = safe(PROFILE, 'ui_layer', {});
  const conv = safe(PROFILE, 'naming_conventions', {});

  const perf = safe(PROFILE, 'data_model.performance', {});
  const topoBadge = topo.pattern === 'anchor-buoy' ? 'good' : topo.pattern === 'spider-web' ? 'danger' : 'warn';
  const deadFieldPct = pct(safe(health, 'dead_fields.count', 0), s.fields || 1);
  const deadScriptPct = pct(safe(health, 'dead_scripts.count', 0), s.scripts || 1);
  const orphanCount = (ui.orphaned_layouts || []).length;
  const totalUnstored = perf.total_unstored || 0;
  const totalSummary = perf.total_summary || 0;
  const unstoredWarn = (perf.unstored_pct || 0) > 10 ? 'danger' : (perf.unstored_pct || 0) > 5 ? 'warn' : 'good';

  let html = '<div class="section-title" style="font-size:1.1rem;margin-bottom:16px;">Solution at a Glance</div>';
  html += '<div class="highlight-grid">';

  html += `<div class="highlight-card ${topoBadge}">
    <h4>Relationship Topology</h4>
    <div class="hl-value">${esc(topo.pattern || 'unknown')}</div>
    <div style="color:var(--text-muted);font-size:0.82rem;margin-top:4px;">${s.table_occurrences || 0} TOs, ${s.relationships || 0} relationships</div>
  </div>`;

  html += `<div class="highlight-card">
    <h4>Script Coverage</h4>
    <div class="hl-value">${(bl.call_graph_edges || 0).toLocaleString()} call edges</div>
    <div style="color:var(--text-muted);font-size:0.82rem;margin-top:4px;">${(bl.entry_points || []).length} entry points, ${(bl.utility_scripts || []).length} utilities</div>
  </div>`;

  html += `<div class="highlight-card">
    <h4>Naming Convention</h4>
    <div class="hl-value">${esc(conv.dominant_case || 'mixed')}</div>
    <div style="color:var(--text-muted);font-size:0.82rem;margin-top:4px;">${Object.keys(safe(conv, 'prefix_conventions', {})).length} prefix patterns detected</div>
  </div>`;

  html += `<div class="highlight-card ${deadFieldPct > 40 ? 'danger' : deadFieldPct > 20 ? 'warn' : 'good'}">
    <h4>Unreferenced Fields</h4>
    <div class="hl-value">${safe(health, 'dead_fields.count', 'N/A')}</div>
    <div style="color:var(--text-muted);font-size:0.82rem;margin-top:4px;">${deadFieldPct}% of ${s.fields || 0} total</div>
  </div>`;

  html += `<div class="highlight-card ${deadScriptPct > 40 ? 'danger' : deadScriptPct > 20 ? 'warn' : 'good'}">
    <h4>Unreferenced Scripts</h4>
    <div class="hl-value">${safe(health, 'dead_scripts.count', 'N/A')}</div>
    <div style="color:var(--text-muted);font-size:0.82rem;margin-top:4px;">${deadScriptPct}% of ${s.scripts || 0} total</div>
  </div>`;

  html += `<div class="highlight-card ${orphanCount > 20 ? 'warn' : 'good'}">
    <h4>Orphaned Layouts</h4>
    <div class="hl-value">${orphanCount}</div>
    <div style="color:var(--text-muted);font-size:0.82rem;margin-top:4px;">of ${s.layouts || 0} total layouts</div>
  </div>`;

  html += `<div class="highlight-card">
    <h4>Largest Script</h4>
    <div class="hl-value">${esc((safe(bl, 'line_counts.largest_scripts', [['']])[0] || [''])[0])}</div>
    <div style="color:var(--text-muted);font-size:0.82rem;margin-top:4px;">${(safe(bl, 'line_counts.largest_scripts', [[0,0]])[0] || [0,0])[1]} lines</div>
  </div>`;

  html += `<div class="highlight-card">
    <h4>Custom Functions</h4>
    <div class="hl-value">${s.custom_functions || 0}</div>
    <div style="color:var(--text-muted);font-size:0.82rem;margin-top:4px;">${safe(PROFILE, 'custom_functions.categories.functional', 0)} functional, ${safe(PROFILE, 'custom_functions.categories.solution_specific', 0)} solution-specific</div>
  </div>`;

  html += `<div class="highlight-card ${unstoredWarn}">
    <h4>Performance: Unstored Calcs</h4>
    <div class="hl-value">${totalUnstored}</div>
    <div style="color:var(--text-muted);font-size:0.82rem;margin-top:4px;">${perf.unstored_pct || 0}% of all fields &bull; ${totalSummary} summary fields</div>
  </div>`;

  // Multi-file architecture card (when applicable)
  const mf = safe(PROFILE, 'multi_file', {});
  if (mf.is_multi_file && mf.file_architecture && mf.file_architecture !== 'single') {
    const archLabels = { data_separation: 'Data Separation', multi_file: 'Multi-File' };
    const archLabel = archLabels[mf.file_architecture] || mf.file_architecture;
    const fileList = (mf.files || []).map(f => `${esc(f.name)} (${esc(f.role)})`).join(', ');
    html += `<div class="highlight-card" style="border-color:#fb923c;">
      <h4>Multi-File Architecture</h4>
      <div class="hl-value">${esc(archLabel)}</div>
      <div style="color:var(--text-muted);font-size:0.82rem;margin-top:4px;">${esc(fileList)}</div>
    </div>`;
  }

  html += '</div>';

  // Extensions note
  const skipped = safe(PROFILE, 'extensions.skipped', []);
  if (skipped.length > 0) {
    html += `<div style="margin-top:16px;padding:12px;background:rgba(108,140,255,0.05);border:1px solid rgba(108,140,255,0.15);border-radius:var(--radius);font-size:0.85rem;color:var(--text-muted);">
      Optional extensions not installed: ${esc(skipped.join(', '))}. Install via <code>pip3 install -r .cursor/skills/solution-analysis/assets/requirements-analyze.txt</code> for deeper analysis.
    </div>`;
  }

  el.innerHTML = html;
  initTab('tabOverview');
});

section('Data Model', function() {
  const dm = safe(PROFILE, 'data_model', {});
  const tables = dm.tables || {};
  const topo = dm.topology || {};
  const rels = dm.relationships || {};
  const toGroups = dm.table_occurrences || {};

  const perf = dm.performance || {};
  const hotspots = perf.hotspot_tables || [];

  // Detect multi-file at section scope (needed for table headers and chart)
  const solName = PROFILE.solution || '';
  const sourceFiles = new Set(Object.values(tables).map(t => t.source_file || solName));
  const isMultiFile = sourceFiles.size > 1;

  // Build static HTML structure
  document.getElementById('tabDataModel').innerHTML = `
    <div class="grid-2">
      <div class="card"><h3>Relationship Graph Topology</h3><div id="topologyStats"></div></div>
      <div class="card"><h3>Relationships Summary</h3><div id="relStats"></div></div>
    </div>
    <div class="card" style="margin-bottom:20px">
      <h3>Performance: Unstored &amp; Summary Fields</h3>
      <div class="grid-3" style="margin-bottom:0;">
        <div class="gauge-container">
          <div class="gauge-value" style="color:${(perf.unstored_pct||0) > 10 ? 'var(--red)' : (perf.unstored_pct||0) > 5 ? 'var(--yellow)' : 'var(--green)'}">${perf.total_unstored || 0}</div>
          <div class="gauge-label">Unstored Calcs (${perf.unstored_pct || 0}%)</div>
          <div class="gauge-bar"><div class="gauge-fill" style="width:${Math.min(perf.unstored_pct||0, 100)*2}%;background:${(perf.unstored_pct||0) > 10 ? 'var(--red)' : (perf.unstored_pct||0) > 5 ? 'var(--yellow)' : 'var(--green)'};"></div></div>
        </div>
        <div class="gauge-container">
          <div class="gauge-value" style="color:${(perf.total_summary||0) > 20 ? 'var(--yellow)' : 'var(--green)'}">${perf.total_summary || 0}</div>
          <div class="gauge-label">Summary Fields (${perf.summary_pct || 0}%)</div>
          <div class="gauge-bar"><div class="gauge-fill" style="width:${Math.min(perf.summary_pct||0, 100)*5}%;background:${(perf.total_summary||0) > 20 ? 'var(--yellow)' : 'var(--green)'};"></div></div>
        </div>
        <div class="gauge-container">
          <div class="gauge-value" style="color:var(--text-muted)">${perf.total_global || 0}</div>
          <div class="gauge-label">Global Fields</div>
        </div>
      </div>
      ${hotspots.length > 0 ? `
      <div style="margin-top:16px;">
        <div style="font-size:0.82rem;color:var(--text-muted);margin-bottom:8px;">Tables with unstored/summary fields (performance hotspots):</div>
        <div class="chart-container"><canvas id="chartPerfHotspots"></canvas></div>
      </div>` : ''}
    </div>
    <div class="card" style="margin-bottom:20px"><h3>Solution Visualization</h3><div id="relGraph" class="network-container"></div><div id="relGraphLegend" style="display:none;padding:8px 12px;font-size:0.82rem;color:var(--text-muted);"></div></div>
    <div id="perFileGraphsSection" style="display:none"></div>
    <div class="grid-2">
      <div class="card"><h3>Table Sizes (Field Count)</h3><div class="chart-container"><canvas id="chartTableSizes"></canvas></div></div>
      <div class="card"><h3>Field Types Distribution</h3><div class="chart-container"><canvas id="chartFieldTypes"></canvas></div></div>
    </div>
    <div class="card"><h3>All Tables</h3><table id="tableList" class="display" style="width:100%"><thead><tr>
      <th>Table</th>${isMultiFile ? '<th>Source</th>' : ''}<th>Fields</th><th>PK</th><th>FKs</th><th>Unstored</th><th>Summary</th><th>Global</th><th>Text</th><th>Number</th><th>Other</th>
    </tr></thead><tbody></tbody></table></div>`;

  // Topology stats
  const badgeClass = topo.pattern === 'anchor-buoy' ? 'badge-green' : topo.pattern === 'spider-web' ? 'badge-red' : 'badge-yellow';
  document.getElementById('topologyStats').innerHTML = `
    <div class="stat-row"><span class="stat-label">Pattern</span><span class="badge ${badgeClass}">${esc(topo.pattern || 'unknown')}</span></div>
    <div class="stat-row"><span class="stat-label">Avg Degree</span><span class="stat-value">${topo.avg_degree ?? 'N/A'}</span></div>
    <div class="stat-row"><span class="stat-label">Max Degree</span><span class="stat-value">${topo.max_degree ?? 'N/A'}</span></div>
    <div class="stat-row"><span class="stat-label">Hub TOs (&ge; 5)</span><span class="stat-value">${topo.hub_count ?? 0}</span></div>
    <div class="stat-row"><span class="stat-label">Low-degree %</span><span class="stat-value">${topo.low_degree_pct != null ? (topo.low_degree_pct * 100).toFixed(0) + '%' : 'N/A'}</span></div>
    ${topo.connected_components ? `<div class="stat-row"><span class="stat-label">Components</span><span class="stat-value">${topo.connected_components}</span></div>` : ''}
    ${topo.anchor_tables ? `<div class="stat-row"><span class="stat-label">Anchors</span><span class="stat-value">${esc(topo.anchor_tables.join(', '))}</span></div>` : ''}`;

  document.getElementById('relStats').innerHTML = `
    <div class="stat-row"><span class="stat-label">Total</span><span class="stat-value">${rels.total || 0}</span></div>
    <div class="stat-row"><span class="stat-label">Multi-predicate</span><span class="stat-value">${rels.multi_predicate || 0}</span></div>
    <div class="stat-row"><span class="stat-label">Self-joins</span><span class="stat-value">${rels.self_joins || 0}</span></div>
    <div class="stat-row"><span class="stat-label">Cascade Create</span><span class="stat-value">${safe(rels, 'cascades.create', 0)}</span></div>
    <div class="stat-row"><span class="stat-label">Cascade Delete</span><span class="stat-value">${safe(rels, 'cascades.delete', 0)}</span></div>
    <div class="stat-row"><span class="stat-label">Equal Joins</span><span class="stat-value">${safe(rels, 'by_join_type.Equal', 0)}</span></div>
    <div class="stat-row"><span class="stat-label">Cartesian Products</span><span class="stat-value">${safe(rels, 'by_join_type.CartesianProduct', 0)}</span></div>`;

  // Lazy-init charts
  registerChart('tabDataModel', function() {
    // Force-directed graph (Vis.js)
    // Determine if multi-file — color nodes by source file
    const mfInfo = safe(PROFILE, 'multi_file', {});
    // Color palette: local file = blue, first external = orange, others cycle
    const fileColors = {};
    let fileIdx = 0;
    const externalPalette = ['#fb923c', '#4ade80', '#a78bfa', '#f472b6', '#38bdf8'];
    sourceFiles.forEach(sf => {
      if (sf === solName) { fileColors[sf] = '#6c8cff'; }
      else { fileColors[sf] = externalPalette[fileIdx++ % externalPalette.length]; }
    });

    const nodes = Object.entries(tables).map(([name, t], i) => {
      const src = t.source_file || solName;
      const bg = isMultiFile ? fileColors[src] : colorFor(i);
      return {
        id: name, label: name, value: t.field_count,
        color: { background: bg, border: bg, highlight: { background: '#fff', border: bg } },
        font: { color: '#e1e4ed', size: 11 }, shape: 'dot',
        title: `${name}\n${t.field_count} fields\nSource: ${src}\nTOs: ${(toGroups[name] || {count: 0}).count || 0}`,
      };
    });
    const edges = (dm.base_table_edges || []).map(e => {
      // Support both old [a, b] and new {left, right, cross_file} formats
      const from = e.left || e[0];
      const to = e.right || e[1];
      const crossFile = e.cross_file || false;
      return {
        from, to,
        dashes: crossFile,
        color: { color: crossFile ? 'rgba(251,146,60,0.4)' : 'rgba(108,140,255,0.3)', highlight: crossFile ? '#fb923c' : '#6c8cff' },
        width: crossFile ? 2 : 1,
      };
    });
    new vis.Network(document.getElementById('relGraph'), { nodes, edges }, {
      physics: { solver: 'forceAtlas2Based', forceAtlas2Based: { gravitationalConstant: -40, centralGravity: 0.005, springLength: 120 }, stabilization: { iterations: 200 } },
      interaction: { hover: true, tooltipDelay: 100 },
      nodes: { scaling: { min: 8, max: 40 } },
    });

    // Show legend for multi-file solutions
    if (isMultiFile) {
      const legendEl = document.getElementById('relGraphLegend');
      if (legendEl) {
        let legendHtml = '';
        Object.entries(fileColors).forEach(([name, color]) => {
          const role = (mfInfo.files || []).find(f => f.name === name);
          const roleLabel = role ? ` (${role.role})` : '';
          legendHtml += `<span style="margin-right:16px;"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${color};margin-right:4px;vertical-align:middle;"></span>${esc(name)}${esc(roleLabel)}</span>`;
        });
        legendHtml += '<span style="margin-right:16px;"><span style="display:inline-block;width:16px;height:0;border-top:2px dashed rgba(251,146,60,0.7);margin-right:4px;vertical-align:middle;"></span>Cross-file</span>';
        legendEl.innerHTML = legendHtml;
        legendEl.style.display = 'block';
      }
    }

    // Per-file relationship graphs (tabbed interface)
    const pfg = PROFILE.per_file_graphs || {};
    const pfgFiles = Object.keys(pfg).filter(f => (pfg[f].base_table_edges || []).length > 0);
    if (pfgFiles.length > 0) {
      const pfgSection = document.getElementById('perFileGraphsSection');
      pfgSection.style.display = 'block';

      const fileRoles = {};
      (mfInfo.files || []).forEach(f => { fileRoles[f.name] = f.role || ''; });

      // Build tabbed UI
      let pfgHtml = '<div class="card" style="margin-bottom:20px;">';
      pfgHtml += '<h3>Per-File Relationship Graphs</h3>';

      // Tab bar
      pfgHtml += '<div style="display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px;">';
      pfgFiles.forEach((fname, fi) => {
        const role = fileRoles[fname] || '';
        const roleLabel = role ? ` (${role})` : '';
        const isActive = fi === 0;
        pfgHtml += `<button class="pfg-tab-btn${isActive ? ' pfg-active' : ''}" data-pfg-idx="${fi}">${esc(fname)}${esc(roleLabel)}</button>`;
      });
      pfgHtml += '</div>';

      // Tab panels
      pfgFiles.forEach((fname, fi) => {
        const fg = pfg[fname];
        const fgEdges = fg.base_table_edges || [];
        const fgTables = fg.tables || {};
        const tc = fg.table_classifications || {};
        const hasClass = Object.keys(tc).length > 0;
        const edgeCount = fgEdges.length;
        const tableCount = Object.keys(fgTables).length;
        const erdCount = fgEdges.filter(e => e.erd_classification === 'true_erd').length;
        const utilCount = fgEdges.filter(e => e.erd_classification === 'utility').length;

        // Classification summary for data files
        let classSummary = '';
        if (hasClass) {
          const byCls = {};
          Object.values(tc).forEach(t => { byCls[t.classification] = (byCls[t.classification] || 0) + 1; });
          const parts = [];
          if (byCls.entity) parts.push(`${byCls.entity} entity`);
          if (byCls.join) parts.push(`${byCls.join} join`);
          if (byCls.utility) parts.push(`${byCls.utility} utility`);
          classSummary = `<span style="margin-left:12px;">${parts.join(', ')}</span>`;
        }

        pfgHtml += `<div class="pfg-tab-panel" data-pfg-idx="${fi}" style="${fi !== 0 ? 'display:none;' : ''}">
          <div style="display:flex;flex-wrap:wrap;gap:16px;margin-bottom:12px;font-size:0.85rem;color:var(--text-muted);">
            <span><strong>${tableCount}</strong> tables</span>
            <span><strong>${edgeCount}</strong> relationships</span>
            <span><strong>${fg.to_count || 0}</strong> TOs</span>
            ${erdCount > 0 ? `<span><strong>${erdCount}</strong> true ERD</span>` : ''}
            ${utilCount > 0 ? `<span><strong>${utilCount}</strong> utility</span>` : ''}
            ${classSummary}
          </div>
          <div id="pfGraph_${fi}" class="network-container"></div>
          <div id="pfLegend_${fi}" style="padding:8px 12px;font-size:0.82rem;color:var(--text-muted);"></div>
        </div>`;
      });
      pfgHtml += '</div>';
      pfgSection.innerHTML = pfgHtml;

      // Tab switching logic
      const pfgRendered = new Set();
      function switchPfgTab(idx) {
        document.querySelectorAll('.pfg-tab-btn').forEach(btn => {
          btn.classList.toggle('pfg-active', parseInt(btn.dataset.pfgIdx) === idx);
        });
        document.querySelectorAll('.pfg-tab-panel').forEach(p => {
          p.style.display = parseInt(p.dataset.pfgIdx) === idx ? '' : 'none';
        });
        if (!pfgRendered.has(idx)) renderPfgGraph(idx);
      }
      document.querySelectorAll('.pfg-tab-btn').forEach(btn => {
        btn.addEventListener('click', () => switchPfgTab(parseInt(btn.dataset.pfgIdx)));
      });

      // Render a per-file graph by index (lazy — only on first tab activation)
      const erdColors = { entity: '#4ade80', join: '#facc15', utility: '#6b7280' };
      function renderPfgGraph(fi) {
        pfgRendered.add(fi);
        const fname = pfgFiles[fi];
        const fg = pfg[fname];
        const fgTables = fg.tables || {};
        const fgEdges = fg.base_table_edges || [];
        const tc = fg.table_classifications || {};
        const hasClass = Object.keys(tc).length > 0;

        const nodes = Object.entries(fgTables).map(([name, t], i) => {
          const cls = tc[name] ? tc[name].classification : null;
          const bg = hasClass && cls ? erdColors[cls] : colorFor(i);
          const clsLabel = cls ? ` [${cls}]` : '';
          return {
            id: name, label: name, value: t.field_count || 1,
            color: { background: bg, border: bg, highlight: { background: '#fff', border: bg } },
            font: { color: '#e1e4ed', size: 11 }, shape: 'dot',
            title: `${name}${clsLabel}\n${t.field_count || 0} fields${cls && tc[name].signals ? '\n' + tc[name].signals.join(', ') : ''}`,
          };
        });

        const edges = fgEdges.map(e => {
          const isUtil = e.erd_classification === 'utility';
          const isUncertain = e.erd_classification === 'uncertain';
          return {
            from: e.left, to: e.right,
            dashes: isUtil,
            color: { color: isUtil ? 'rgba(107,114,128,0.4)' : isUncertain ? 'rgba(250,204,21,0.4)' : 'rgba(74,222,128,0.4)', highlight: isUtil ? '#6b7280' : isUncertain ? '#facc15' : '#4ade80' },
            width: isUtil ? 1 : 2,
            title: `${e.left} \u2014 ${e.right}\nJoin: ${e.join_type || 'Equal'}\nFields: ${e.join_fields || ''}\nERD: ${e.erd_classification || 'unknown'}${e.cascade_delete ? '\nCascade Delete' : ''}${e.to_pairs > 1 ? '\nTO pairs: ' + e.to_pairs : ''}`,
          };
        });

        new vis.Network(document.getElementById(`pfGraph_${fi}`), { nodes, edges }, {
          physics: { solver: 'forceAtlas2Based', forceAtlas2Based: { gravitationalConstant: -35, centralGravity: 0.008, springLength: 100 }, stabilization: { iterations: 200 } },
          interaction: { hover: true, tooltipDelay: 100 },
          nodes: { scaling: { min: 8, max: 35 } },
        });

        // Legend
        let lgHtml = '';
        if (hasClass) {
          lgHtml += '<span style="margin-right:14px;"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#4ade80;margin-right:4px;vertical-align:middle;"></span>Entity</span>';
          lgHtml += '<span style="margin-right:14px;"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#facc15;margin-right:4px;vertical-align:middle;"></span>Join</span>';
          lgHtml += '<span style="margin-right:14px;"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#6b7280;margin-right:4px;vertical-align:middle;"></span>Utility</span>';
        }
        lgHtml += '<span style="margin-right:14px;"><span style="display:inline-block;width:16px;height:0;border-top:2px solid rgba(74,222,128,0.7);margin-right:4px;vertical-align:middle;"></span>True ERD</span>';
        lgHtml += '<span style="margin-right:14px;"><span style="display:inline-block;width:16px;height:0;border-top:2px dashed rgba(107,114,128,0.7);margin-right:4px;vertical-align:middle;"></span>Utility rel.</span>';
        document.getElementById(`pfLegend_${fi}`).innerHTML = lgHtml;
      }

      // Render first tab immediately
      renderPfgGraph(0);
    }

    // Table sizes bar chart
    const sorted = Object.entries(tables).sort((a, b) => b[1].field_count - a[1].field_count).slice(0, 25);
    new Chart(document.getElementById('chartTableSizes'), {
      type: 'bar',
      data: { labels: sorted.map(t => t[0]), datasets: [{ label: 'Fields', data: sorted.map(t => t[1].field_count), backgroundColor: sorted.map((_, i) => colorFor(i)), borderRadius: 4 }] },
      options: { indexAxis: 'y', responsive: true, plugins: { legend: { display: false } },
        scales: { x: { ticks: { color: '#8b90a0' }, grid: { color: '#2a2e3d' } }, y: { ticks: { color: '#e1e4ed', font: { size: 11 } }, grid: { display: false } } } }
    });

    // Field types doughnut
    const typeCounts = {};
    Object.values(tables).forEach(t => Object.entries(t.by_datatype || {}).forEach(([dt, c]) => { typeCounts[dt] = (typeCounts[dt] || 0) + c; }));
    const typeSorted = Object.entries(typeCounts).sort((a, b) => b[1] - a[1]);
    if (typeSorted.length > 0) {
      new Chart(document.getElementById('chartFieldTypes'), {
        type: 'doughnut',
        data: { labels: typeSorted.map(s => s[0]), datasets: [{ data: typeSorted.map(s => s[1]), backgroundColor: typeSorted.map((_, i) => colorFor(i)), borderWidth: 0 }] },
        options: { responsive: true, plugins: { legend: { position: 'right', labels: { color: '#e1e4ed', font: { size: 12 } } } } }
      });
    }

    // Performance hotspots stacked bar chart
    if (hotspots.length > 0 && document.getElementById('chartPerfHotspots')) {
      new Chart(document.getElementById('chartPerfHotspots'), {
        type: 'bar',
        data: {
          labels: hotspots.map(h => h.table),
          datasets: [
            { label: 'Unstored', data: hotspots.map(h => h.unstored), backgroundColor: '#f87171', borderRadius: 4 },
            { label: 'Summary', data: hotspots.map(h => h.summary), backgroundColor: '#facc15', borderRadius: 4 },
          ]
        },
        options: {
          indexAxis: 'y', responsive: true,
          plugins: { legend: { labels: { color: '#e1e4ed' } } },
          scales: {
            x: { stacked: true, ticks: { color: '#8b90a0' }, grid: { color: '#2a2e3d' } },
            y: { stacked: true, ticks: { color: '#e1e4ed', font: { size: 11 } }, grid: { display: false } },
          }
        }
      });
    }

    // Tables DataTable (with unstored/summary/global columns)
    const rows = Object.entries(tables).map(([name, t]) => {
      const base = [
        name, t.field_count, t.has_primary_key ? 'Yes' : 'No', t.foreign_key_count,
        t.unstored_count || 0, t.summary_count || 0, t.global_count || 0,
        (t.by_datatype || {})['Text'] || 0, (t.by_datatype || {})['Number'] || 0,
        Object.entries(t.by_datatype || {}).filter(([k]) => !['Text','Number'].includes(k)).reduce((s, [_, v]) => s + v, 0),
      ];
      if (isMultiFile) base.splice(1, 0, t.source_file || solName);
      return base;
    });
    const sortCol = isMultiFile ? 2 : 1;
    $('#tableList').DataTable({ data: rows, order: [[sortCol, 'desc']], pageLength: 15, language: { search: 'Filter:' } });
  });
});

      new Chart(document.getElementById('chartPrefixes'), {
        type: 'bar',
        data: { labels: prefSorted.map(s => s[0].split(' (')[0]), datasets: [{ data: prefSorted.map(s => s[1]), backgroundColor: prefSorted.map((_, i) => colorFor(i)), borderRadius: 4 }] },
        options: { indexAxis: 'y', responsive: true, plugins: { legend: { display: false } },
          scales: { x: { ticks: { color: '#8b90a0' }, grid: { color: '#2a2e3d' } }, y: { ticks: { color: '#e1e4ed', font: { size: 11 } }, grid: { display: false } } } }
      });
    }

    // Sunburst (D3) — responsive with viewBox
    const folders = bl.folders || {};
    const root = { name: 'Scripts', children: [] };
    const folderMap = {};
    Object.entries(folders).forEach(([path, info]) => {
      const parts = path.split('/');
      let parent = root; let fullPath = '';
      parts.forEach((part, i) => {
        fullPath += (i > 0 ? '/' : '') + part;
        if (!folderMap[fullPath]) { const node = { name: part, children: [], value: 0 }; folderMap[fullPath] = node; parent.children.push(node); }
        parent = folderMap[fullPath];
        if (i === parts.length - 1) { parent.value = info.count; parent.children = parent.children || []; }
      });
    });
    function cleanLeaves(node) {
      if (node.children && node.children.length === 0) delete node.children;
      else if (node.children) {
        node.children.forEach(cleanLeaves);
        if (node.value > 0 && node.children.length > 0) {
          const childSum = node.children.reduce((s, c) => s + (c.value || 0), 0);
          if (node.value > childSum) node.children.push({ name: '(direct)', value: node.value - childSum });
          delete node.value;
        }
      }
    }
    cleanLeaves(root);

    const container = document.getElementById('sunburstContainer');
    const size = 500;
    const radius = size / 2;
    const svg = d3.select(container).append('svg')
      .attr('viewBox', `0 0 ${size} ${size}`)
      .attr('preserveAspectRatio', 'xMidYMid meet')
      .style('width', '100%').style('height', '100%')
      .append('g').attr('transform', `translate(${size/2},${size/2})`);

    const partition = d3.partition().size([2 * Math.PI, radius]);
    const hierarchy = d3.hierarchy(root).sum(d => d.value || 0).sort((a, b) => b.value - a.value);
    partition(hierarchy);

    const arc = d3.arc().startAngle(d => d.x0).endAngle(d => d.x1).innerRadius(d => d.y0).outerRadius(d => d.y1 - 1);
    const color = d3.scaleOrdinal(COLORS);

    svg.selectAll('path').data(hierarchy.descendants().filter(d => d.depth)).join('path')
      .attr('d', arc)
      .attr('fill', d => { let c = d; while (c.depth > 1) c = c.parent; return color(c.data.name); })
      .attr('fill-opacity', d => 1 - d.depth * 0.15)
      .attr('stroke', '#0f1117').attr('stroke-width', 0.5)
      .append('title').text(d => `${d.ancestors().map(a => a.data.name).reverse().join(' / ')}\n${d.value} scripts`);

    svg.selectAll('text').data(hierarchy.descendants().filter(d => d.depth && (d.x1 - d.x0) > 0.15)).join('text')
      .attr('transform', d => {
        const angle = (d.x0 + d.x1) / 2; const r = (d.y0 + d.y1) / 2;
        return `translate(${Math.sin(angle) * r}, ${-Math.cos(angle) * r}) rotate(${angle * 180 / Math.PI - 90})`;
      })
      .attr('text-anchor', 'middle').attr('dy', '0.35em').attr('font-size', '10px').attr('fill', '#e1e4ed')
      .text(d => d.data.name.length > 14 ? d.data.name.slice(0, 12) + '..' : d.data.name);

    // Largest scripts bar chart
    const scripts = safe(bl, 'line_counts.largest_scripts', []);
    if (scripts.length > 0) {
      new Chart(document.getElementById('chartLargestScripts'), {
        type: 'bar',
        data: { labels: scripts.map(s => s[0].length > 30 ? s[0].slice(0, 28) + '..' : s[0]), datasets: [{ label: 'Lines', data: scripts.map(s => s[1]), backgroundColor: COLORS.slice(0, scripts.length), borderRadius: 4 }] },
        options: { indexAxis: 'y', responsive: true, plugins: { legend: { display: false } },
          scales: { x: { ticks: { color: '#8b90a0' }, grid: { color: '#2a2e3d' } }, y: { ticks: { color: '#e1e4ed', font: { size: 11 } }, grid: { display: false } } } }
      });
    }

    // Script call graph (Vis.js) — with actual edges
    const callGraph = bl.call_graph || [];
    const entrySet = new Set(bl.entry_points || []);
    const utilSet = new Set(bl.utility_scripts || []);

    if (callGraph.length > 0) {
      // Collect unique script names from edges
      const scriptNames = new Set();
      callGraph.forEach(([a, b]) => { scriptNames.add(a); scriptNames.add(b); });

      // Assign colors by folder
      const folderLookup = {};
      Object.entries(bl.folders || {}).forEach(([folder, info]) => {
        (info.scripts || []).forEach(s => { folderLookup[s] = folder; });
      });

      const nodes = [...scriptNames].map((name, i) => {
        const isEntry = entrySet.has(name);
        const isUtil = utilSet.has(name);
        return {
          id: name, label: name.length > 22 ? name.slice(0, 20) + '..' : name,
          color: { background: isUtil ? '#facc15' : isEntry ? '#4ade80' : colorFor(i % 20), border: isUtil ? '#facc15' : isEntry ? '#4ade80' : colorFor(i % 20) },
          font: { color: isUtil ? '#1a1d27' : '#e1e4ed', size: 9 },
          shape: isEntry ? 'diamond' : isUtil ? 'star' : 'dot',
          size: isUtil ? 16 : isEntry ? 12 : 8,
          title: name + (isEntry ? ' (entry point)' : '') + (isUtil ? ' (utility)' : ''),
        };
      });

      const edges = callGraph.map(([from, to]) => ({
        from, to, arrows: 'to',
        color: { color: 'rgba(108,140,255,0.25)', highlight: '#6c8cff' }, width: 1,
      }));

      // Limit to 300 edges for performance
      const limitedEdges = edges.slice(0, 300);
      const limitedNodeIds = new Set();
      limitedEdges.forEach(e => { limitedNodeIds.add(e.from); limitedNodeIds.add(e.to); });
      const limitedNodes = nodes.filter(n => limitedNodeIds.has(n.id));

      new vis.Network(document.getElementById('scriptGraph'), { nodes: limitedNodes, edges: limitedEdges }, {
        physics: { solver: 'forceAtlas2Based', forceAtlas2Based: { gravitationalConstant: -30, centralGravity: 0.008, springLength: 80 }, stabilization: { iterations: 200 } },
        interaction: { hover: true, tooltipDelay: 100 },
        edges: { smooth: { type: 'continuous' } },
      });
    } else {
      document.getElementById('scriptGraph').innerHTML = '<div class="empty-state">No call graph data available. Re-run analysis to include call edges.</div>';
    }
  });
});

    if (bpEntries.length > 0) {

    // Layout Classification doughnut (list/detail/report/etc. — existing)

section('Custom Functions', function() {
  const cf = safe(PROFILE, 'custom_functions', {});
  const fns = cf.functions || {};
  const cats = cf.categories || {};
  const chains = cf.dependency_chains || [];

  document.getElementById('tabCustomFunctions').innerHTML = `
    <div class="grid-2">
      <div class="card"><h3>Function Categories</h3><div class="chart-container"><canvas id="chartCFCategories"></canvas></div></div>
      <div class="card"><h3>Dependency Chains</h3><div id="cfChains"></div></div>
    </div>
    <div class="card"><h3>All Custom Functions</h3><table id="cfTable" class="display" style="width:100%"><thead><tr>
      <th>Function</th><th>Params</th><th>Lines</th><th>Dependencies</th><th>Category</th>
    </tr></thead><tbody></tbody></table></div>`;

  // Dependency chains (static, safe)
  const chainsEl = document.getElementById('cfChains');
  if (chains.length === 0) { chainsEl.innerHTML = '<div class="empty-state">No deep dependency chains found.</div>'; }
  else {
    const maxDepth = Math.max(...chains.map(c => c.depth), 1);
    let html = '';
    chains.forEach(c => {
      const p = (c.depth / maxDepth) * 100;
      html += `<div style="margin-bottom:12px;"><div style="display:flex;justify-content:space-between;margin-bottom:4px;">
        <span style="font-size:0.85rem;">${esc(c.function)}</span><span class="badge badge-blue">depth: ${c.depth}</span>
      </div><div class="gauge-bar"><div class="gauge-fill" style="width:${p}%;background:var(--accent);"></div></div></div>`;
    });
    chainsEl.innerHTML = html;
  }

  registerChart('tabCustomFunctions', function() {
    // Categories doughnut
    const catEntries = Object.entries(cats).filter(([_, v]) => v > 0).sort((a, b) => b[1] - a[1]);
    if (catEntries.length > 0) {
      new Chart(document.getElementById('chartCFCategories'), {
        type: 'doughnut',
        data: { labels: catEntries.map(s => s[0]), datasets: [{ data: catEntries.map(s => s[1]), backgroundColor: catEntries.map((_, i) => colorFor(i)), borderWidth: 0 }] },
        options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: '#e1e4ed' } } } }
      });
    }

    // CF DataTable — derive category from server data
    const rows = Object.entries(fns).map(([name, info]) => {
      let cat = 'functional';
      if (info.line_count <= 2 && info.param_count === 0) cat = 'constant';
      else if ((info.dependencies || []).length > 0) cat = 'solution-specific';
      return [name, info.param_count, info.line_count, (info.dependencies || []).join(', ') || '-', cat];
    });
    $('#cfTable').DataTable({ data: rows, order: [[2, 'desc']], pageLength: 15, language: { search: 'Filter:' } });
  });
});

section('Health', function() {
  const h = safe(PROFILE, 'health', {});
  const el = document.getElementById('tabHealth');

  if (!h.xref_available) {
    el.innerHTML = `<div class="card"><h3>Health Metrics Unavailable</h3>
      <p class="empty-state">${esc(h.note || 'xref.index not found. Run trace.py build to enable health metrics.')}</p></div>`;
    return;
  }

  const totalFields = safe(PROFILE, 'summary.fields', 1);
  const totalScripts = safe(PROFILE, 'summary.scripts', 1);
  const deadFieldPct = pct(safe(h, 'dead_fields.count', 0), totalFields);
  const deadScriptPct = pct(safe(h, 'dead_scripts.count', 0), totalScripts);
  const dfColor = deadFieldPct > 50 ? 'var(--red)' : deadFieldPct > 25 ? 'var(--yellow)' : 'var(--green)';
  const dsColor = deadScriptPct > 50 ? 'var(--red)' : deadScriptPct > 25 ? 'var(--yellow)' : 'var(--green)';

  el.innerHTML = `
    <div class="grid-3">
      <div class="card"><h3>Unreferenced Fields</h3><div class="gauge-container">
        <div class="gauge-value" style="color:${dfColor}">${safe(h, 'dead_fields.count', 0)}</div>
        <div class="gauge-label">${deadFieldPct}% of ${totalFields} fields</div>
        <div class="gauge-bar"><div class="gauge-fill" style="width:${Math.min(deadFieldPct, 100)}%;background:${dfColor};"></div></div>
      </div></div>
      <div class="card"><h3>Unreferenced Scripts</h3><div class="gauge-container">
        <div class="gauge-value" style="color:${dsColor}">${safe(h, 'dead_scripts.count', 0)}</div>
        <div class="gauge-label">${deadScriptPct}% of ${totalScripts} scripts</div>
        <div class="gauge-bar"><div class="gauge-fill" style="width:${Math.min(deadScriptPct, 100)}%;background:${dsColor};"></div></div>
      </div></div>
      <div class="card"><h3>Cross References</h3><div class="gauge-container">
        <div class="gauge-value" style="color:var(--cyan)">${(h.total_xref_entries || 0).toLocaleString()}</div>
        <div class="gauge-label">total cross-references</div>
      </div></div>
    </div>
    <div class="grid-2">
      <div class="card"><h3>Disconnected Tables</h3><div id="disconnectedList"></div></div>
      <div class="card"><h3>Empty Scripts</h3><div id="emptyScriptsList"></div></div>
    </div>
    <div class="grid-2">
      <div class="card"><h3>Unreferenced Fields <span style="font-size:0.7rem;font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-muted);">&mdash; not found in scripts, calculations, layouts, or relationships</span></h3><div id="deadFieldsSample"></div></div>
      <div class="card"><h3>Unreferenced Scripts <span style="font-size:0.7rem;font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-muted);">&mdash; not called by other scripts, buttons, or triggers visible to static analysis</span></h3><div id="deadScriptsSample"></div></div>
    </div>`;

  // Disconnected tables
  const dtEl = document.getElementById('disconnectedList');
  const dt = h.disconnected_tables || [];
  dtEl.innerHTML = dt.length === 0 ? '<div style="color:var(--green);">All tables are connected.</div>' :
    '<div class="tag-list">' + dt.map(t => `<span class="tag tag-red">${esc(t)}</span>`).join('') + '</div>';

  // Empty scripts
  const esEl = document.getElementById('emptyScriptsList');
  const es = h.empty_scripts || [];
  esEl.innerHTML = es.length === 0 ? '<div style="color:var(--green);">No empty scripts found.</div>' :
    '<div class="tag-list">' + es.map(s => `<span class="tag tag-yellow">${esc(s)}</span>`).join('') + '</div>';

  // Dead fields sample
  const dfEl = document.getElementById('deadFieldsSample');
  const dfs = safe(h, 'dead_fields.sample', []);
  dfEl.innerHTML = dfs.length === 0 ? '<div class="empty-state">None.</div>' :
    '<div class="tag-list">' + dfs.map(f => `<span class="tag tag-red">${esc(f)}</span>`).join('') + '</div>';

  // Dead scripts sample
  const dsEl = document.getElementById('deadScriptsSample');
  const dss = safe(h, 'dead_scripts.sample', []);
  dsEl.innerHTML = dss.length === 0 ? '<div class="empty-state">None.</div>' :
    '<div class="tag-list">' + dss.map(s => `<span class="tag tag-red">${esc(s)}</span>`).join('') + '</div>';
});
